services:
  - type: web
    name: sales-analysis
    env: python
    plan: free
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.13"
      - key: MINIMAX_API_KEY
        sync: false  # 需要手动在 Dashboard 设置
      - key: DEFAULT_GOLD_PRICE
        value: "930"
      - key: DEFAULT_SILVER_PRICE
        value: "17"
      - key: DATABASE_URL
        fromDatabase:
          name: sales-db
          property: connectionString

databases:
  - name: sales-db
    plan: free
